services:
  siaed-client:
    container_name: siaed-client
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5248}
    ports:
      - "90:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5248}
    restart: unless-stopped
    networks:
      - nginx_net

networks:
  nginx_net:
    external: true
